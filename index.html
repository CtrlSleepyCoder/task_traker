<!DOCTYPE html>
<html>
<head>
    <title>Tasks</title>
</head>
<body>

<h1>Task Tracker</h1>

<form method="post">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Task">
    <button type="submit">Add</button>
</form>

<ul>
{% for task in tasks %}
    <li>
        {% if task.done %}
            <s>{{ task.title }}</s>
        {% else %}
            {{ task.title }}
        {% endif %}

        <a href="/toggle/{{ task.id }}/">done</a>
        <a href="/delete/{{ task.id }}/">delete</a>
    </li>
{% endfor %}
</ul>

</body>
</html>
